<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funkkanal · Mortys Welt</title>
    <meta name="description" content="Eingehender Funkkanal.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/x-icon" href="../logo.png">
    <link rel="stylesheet" href="../styles.css">
    <style>
        /* ── Signal-Finale ── */
        .signal-card { flex-direction: column; max-width: 640px; position: relative; }
        .signal-inner { padding: 38px 40px 46px; text-align: center; width: 100%; }
        @media (max-width: 420px) { .signal-inner { padding: 28px 22px 34px; } }

        /* Oszilloskop-Streifen (Signature) */
        .wave {
            display: block; width: 100%; height: 56px;
            border-bottom: 1px solid var(--card-border);
            background: rgba(140, 28, 19, 0.05);
        }

        .slug {
            font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
            font-size: .74rem; letter-spacing: .01em; color: var(--text-muted);
            margin: 22px 0 14px;
        }
        .slug b { color: var(--accent-warm); font-weight: 600; letter-spacing: .04em; }

        .signal-title, .reveal-title {
            font-size: clamp(1.6rem, 4vw, 2.3rem); font-weight: 900;
            letter-spacing: -.04em; line-height: 1; color: #e7d7c1; margin-bottom: 16px;
        }
        .signal-title { font-feature-settings: "tnum"; }
        .signal-help { color: var(--text-muted); font-size: .9rem; margin-bottom: 2px; }

        #form { display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; justify-content: center; }
        #code {
            flex: 1; min-width: 200px; padding: 14px 16px; border-radius: 12px;
            background: var(--btn-bg); border: 1px solid var(--btn-border);
            color: #fff; font: inherit; font-size: 1rem; letter-spacing: .04em; text-align: center;
            caret-color: var(--accent); transition: border-color .2s, box-shadow .2s;
        }
        #code:focus { outline: none; border-color: var(--btn-hover-border); box-shadow: 0 0 22px var(--accent-glow); }
        #send {
            padding: 14px 24px; border-radius: 12px; border: 1px solid rgba(140,28,19,.5);
            background: rgba(140,28,19,.22); color: #e7d7c1; font: inherit; font-weight: 700;
            cursor: pointer; transition: background .2s, transform .2s;
        }
        #send:hover { background: rgba(140,28,19,.34); transform: translateY(-2px); }
        #send:disabled { opacity: .65; cursor: default; transform: none; }

        .signal-error { color: #ff6b6b; font-size: .85rem; margin-top: 16px; min-height: 1em; letter-spacing: .01em; }
        .signal-error.egg { color: var(--accent-warm); }

        /* ── Reveal ── */
        .revealed { animation: revealIn .85s cubic-bezier(.16,1,.3,1) both; }
        @keyframes revealIn { from { opacity: 0; transform: scale(.965); } to { opacity: 1; transform: none; } }

        .eyebrow {
            font-size: .72rem; font-weight: 700; letter-spacing: .26em;
            color: var(--accent-warm); text-transform: uppercase; margin-bottom: 14px;
        }
        .video-wrap {
            position: relative; width: 100%; aspect-ratio: 16 / 9; margin: 20px 0 6px;
            border-radius: 14px; overflow: hidden; border: 1px solid var(--card-border); background: #000;
        }
        .video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
        .sub { color: var(--text-muted); font-size: .94rem; margin-top: 16px; line-height: 1.65; }

        .shake { animation: shake .45s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%,90% { transform: translateX(-2px); } 20%,80% { transform: translateX(4px); }
            30%,50%,70% { transform: translateX(-7px); } 40%,60% { transform: translateX(7px); }
        }

        /* ── Easter-Egg-Bewegungen ── */
        .spin { animation: spin360 .9s cubic-bezier(.5,0,.5,1); }
        @keyframes spin360 { to { transform: rotate(360deg); } }

        .wobble { animation: wobble .8s both; }
        @keyframes wobble {
            0%,100% { transform: none; } 15% { transform: translateX(-7px) rotate(-3deg); }
            30% { transform: translateX(6px) rotate(2deg); } 45% { transform: translateX(-5px) rotate(-2deg); }
            60% { transform: translateX(4px) rotate(1deg); } 75% { transform: translateX(-2px) rotate(-1deg); }
        }

        .sneeze { animation: sneeze .55s both; }
        @keyframes sneeze {
            0% { transform: none; } 55% { transform: scale(1.02) translateY(-3px); }
            64% { transform: translate(9px, 6px) rotate(2deg); } 72% { transform: translate(-10px, 4px) rotate(-2deg); }
            82% { transform: translate(6px, 2px); } 100% { transform: none; }
        }

        .dead { animation: dead 1.4s both; filter: grayscale(.7); }
        @keyframes dead {
            0% { transform: none; } 25% { transform: rotate(1deg); }
            100% { transform: rotate(7deg) translateY(8px); opacity: .9; }
        }

        body.disco .card { animation: disco 2.8s linear; }
        @keyframes disco { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }

        /* Konfetti-Overlay */
        .confetti-canvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        @media (prefers-reduced-motion: reduce) {
            .revealed, .spin, .wobble, .sneeze, .dead, body.disco .card { animation: none !important; }
            .dead { filter: none; }
        }
    </style>
</head>

    <script>

    // =====================================================================

    // Die 4 Ziffern stehen nirgends im Klartext.
    const V_SALT = "dggRM4f+GP2LRUe1rMx69A==";
    const V_IV   = "S1PLNA5h5TNO//Mk";
    const V_CT   = "OynR8YrZsGZhNSI4xXjcfrbK";
    const R_SALT = "m39blm9EeX9FOho/MR+Jcg==";
    const R_IV   = "FLugUC7wp632F2F9";
    const R_CT   = "KCk1ooit7G7nvhofvJTMXIcAluLnt2PNP7LuqD6kAGfesk5aESuAu4jWLePFeL+K7MyrEEFLVYPUm8oT3s7yphwPZEz8syEZ7JfiGIZlkg9xAnNGOcWqqUikKr1TTWt1Va1phoEMUbiXGodw6LTcR9zx87/5TFscIp1fBEWcliok6jOtZmgLazGzKZP/SldhRJCOnieR+V88ILDSDpRL3c0iyU3qiG548ebDt9qybFeihPcqI7hVPR/+CEGv4Vlbgq4kbZLQzAOYLY57AhYe4j0mIsIVEGhAZtlv/XjyOKV224eCNoHYWOoACCrq3wrZmmC6gWdO2ovoXow09DTjCFMC1J0Iaywy0g4BJXOH3kkFwQuvN+FFfZKBL4sf/Wlcb0iELtECIf0jB8H/5ujJo1tRmjQVZd+W649n9bg8MYiSKXceUBXNlniJSe6pMSZ3pagKd8niIc/FuehBRZRmErhccoUvV02gqsWnVTmUWsJAGWTZFQuhS1ccSJsaT5+vrTRr1xv5d0DUgrGChkBCtlS0TARb1V2gpqCfEgXJr/xcx2J4S+7gjscyxYF8smfeOH85US77Ii0WIIS//H9+RYQ+kCfxb73uTfaKIrRH2dOENL0C6BzsDHyaUp6ZCePEpdooj6JHXRf/D1yaS0Y5y/tKQeKlPD9JX+g6foW9oy6MSkg=";

    const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
    const $ = (id) => document.getElementById(id);
    const view = $("view"), card = $("card"), err = $("err"), send = $("send"), code = $("code");
    const statusEl = $("status");
    const SLUG_IDLE = '» eingehende übertragung · für <b>henne</b>';

    /* ── Helfer ── */
    function b64ToBytes(s) {
        const bin = atob(s); const u = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
        return u;
    }
    const normalize = (v) => v.toLowerCase().replace(/[^a-z]/g, ""); // muss zum Tool passen

    async function decryptWith(keyStr, saltB64, ivB64, ctB64) {
        const enc = new TextEncoder();
        const km = await crypto.subtle.importKey("raw", enc.encode(keyStr), "PBKDF2", false, ["deriveKey"]);
        const key = await crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: b64ToBytes(saltB64), iterations: 200000, hash: "SHA-256" },
            km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
        const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64ToBytes(ivB64) }, key, b64ToBytes(ctB64));
        return new TextDecoder().decode(pt);
    }
    const verifyMessage = (norm) => decryptWith(norm, V_SALT, V_IV, V_CT);        // wirft, wenn Nachricht falsch
    const decryptReveal = (norm, pin) => decryptWith(norm + pin, R_SALT, R_IV, R_CT); // braucht PIN

    /* ── Decoder-Scramble (mysteriös/spielerisch) ── */
    const GLYPHS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#%&*<>/\\▮▯";
    function scramble(el, text, duration = 1100) {
        if (reduce) { el.textContent = text; return; }
        const start = performance.now();
        const rnd = () => GLYPHS[(Math.random() * GLYPHS.length) | 0];
        (function frame(now) {
            const p = Math.min(1, (now - start) / duration);
            const reveal = Math.floor(p * text.length);
            let out = "";
            for (let i = 0; i < text.length; i++)
                out += (text[i] === " ") ? " " : (i < reveal ? text[i] : rnd());
            el.textContent = out;
            if (p < 1) requestAnimationFrame(frame); else el.textContent = text;
        })(start);
    }

    /* ── Oszilloskop (Signature): scannt → wird beim Senden unruhig → rastet ein ── */
    const wave = $("wave"), wctx = wave.getContext("2d");
    let waveState = "idle", lockMix = 0, dpr = Math.min(devicePixelRatio || 1, 2);
    function sizeWave() {
        dpr = Math.min(devicePixelRatio || 1, 2);
        wave.width = wave.clientWidth * dpr; wave.height = wave.clientHeight * dpr;
    }
    addEventListener("resize", sizeWave); sizeWave();

    function drawWave(t) {
        const w = wave.width, h = wave.height, mid = h / 2;
        wctx.clearRect(0, 0, w, h);
        const amp = (waveState === "decoding" ? 0.34 : 0.16) * h * (1 - lockMix) + 0.5 * lockMix;
        const speed = waveState === "decoding" ? 0.009 : 0.004;
        const color = waveState === "error" ? "rgba(255,107,107,0.85)" : "rgba(231,215,193,0.8)";
        // Grundlinie
        wctx.strokeStyle = color; wctx.lineWidth = 1.4 * dpr; wctx.beginPath();
        for (let x = 0; x <= w; x += 2 * dpr) {
            const n = Math.sin(x * 0.025 / dpr + t * speed) + 0.5 * Math.sin(x * 0.011 / dpr - t * speed * 1.7);
            const jitter = (waveState === "decoding" ? (Math.random() - 0.5) * 0.6 : 0);
            const y = mid + (n + jitter) * amp;
            x === 0 ? wctx.moveTo(x, y) : wctx.lineTo(x, y);
        }
        wctx.stroke();
        // Scan-Punkt
        if (!reduce && lockMix < 1) {
            const sx = ((t * 0.08 * dpr) % w);
            const g = wctx.createRadialGradient(sx, mid, 0, sx, mid, 26 * dpr);
            g.addColorStop(0, "rgba(140,28,19,0.55)"); g.addColorStop(1, "rgba(140,28,19,0)");
            wctx.fillStyle = g; wctx.fillRect(sx - 26 * dpr, 0, 52 * dpr, h);
        }
        if (waveState === "locked" && lockMix < 1) lockMix = Math.min(1, lockMix + 0.04);
    }
    function loop(t) { drawWave(t); requestAnimationFrame(loop); }
    if (reduce) { drawWave(0); } else { requestAnimationFrame(loop); }

    /* ── Konfetti (vanilla, Markenfarben) ── */
    function fireConfetti(palette) {
        if (reduce) return;
        const cv = $("confetti"), ctx = cv.getContext("2d");
        const d = Math.min(devicePixelRatio || 1, 2);
        cv.width = innerWidth * d; cv.height = innerHeight * d;
        const colors = palette || ["#8c1c13", "#e7d7c1", "#ffffff", "#b5342a"];
        const cx = innerWidth * d / 2, cy = innerHeight * d * 0.32;
        const P = Array.from({ length: 150 }, () => {
            const a = Math.random() * Math.PI * 2, sp = (4 + Math.random() * 9) * d;
            return { x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 5 * d,
                     s: (5 + Math.random() * 6) * d, c: colors[(Math.random() * colors.length) | 0],
                     r: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 0.3, life: 0 };
        });
        const t0 = performance.now();
        (function anim(now) {
            const el = now - t0; ctx.clearRect(0, 0, cv.width, cv.height);
            for (const p of P) {
                p.vy += 0.22 * d; p.vx *= 0.99; p.x += p.vx; p.y += p.vy; p.r += p.vr; p.life = el;
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r);
                ctx.globalAlpha = Math.max(0, 1 - el / 2600);
                ctx.fillStyle = p.c; ctx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * 0.6); ctx.restore();
            }
            if (el < 2700) requestAnimationFrame(anim); else ctx.clearRect(0, 0, cv.width, cv.height);
        })(t0);
    }

    /* ── Ablauf ── */
    const wait = (ms) => new Promise(r => setTimeout(r, ms));
    let wrongCount = 0;

    function showMsg(text, isEgg) { err.textContent = text; err.classList.toggle("egg", !!isEgg); }
    function jiggle() { card.classList.remove("shake"); void card.offsetWidth; card.classList.add("shake"); }

    function fx(cls, ms) { if (reduce) return; card.classList.remove(cls); void card.offsetWidth; card.classList.add(cls); setTimeout(() => card.classList.remove(cls), ms); }

        barrelroll:   () => { fx("spin", 900); showMsg("Na gut. Einmal Rolle.", true); },

        ja:     () => showMsg("Schön eilig. Erst entschlüsseln, dann Ja sagen.", true),
        nein:   () => showMsg("Nein? Du weißt noch nicht mal, worum es geht. Weiter.", true),

    // Wortliste bewusst NICHT im Klartext: Base64-obfuskiert, wird zur Laufzeit dekodiert.
    // (Kein Sicherheits-Feature — nur damit keine Schimpfwörter im Quelltext stehen.)
    const RUDE = atob("YXJzY2gsZmlja2VuLGZpY2ssZnVjayxwZW5pcyxwaW1tZWwsc2Nod2Fueix0aXR0ZW4sYm9vYnMsYnVzZW4sbXVzY2hpLHZhZ2luYSxwb3Jubyxwb3JuaHViLHdpY2hzLHNjaGVpc3NlLHNjaGVpc3Msc2hpdCxrYWNrZSxudWRlcyxoZW50YWksc2V4LGdlaWwsbnV0dGUsaHVyZSxiaXRjaCxwdXNzeSxwb3BwZW4sYnVtc2VuLHNwZXJtYSxvbmx5ZmFucyxuYWNrdCxtaWxm").split(",");

    function handleEgg(norm) {
        if (EGGS[norm]) { statusEl.textContent = "» signal verwirrt"; EGGS[norm](); resetSlugSoon(); return true; }
        if (RUDE.some(w => norm.includes(w))) {
            statusEl.textContent = "» fsk 18";
            showMsg("Wow. Diese Frequenz ist FSK 18, und der ganze Chat hat es gesehen. Nochmal, jugendfrei.", true);
            jiggle(); resetSlugSoon(); return true;

    }

    // ── Zwei Phasen: "code" (Nachricht) → "pin" (Identität via Umschlag-Code) ──
    let phase = "code", savedNorm = "", pinTries = 0;

    function enterPinPhase() {
        phase = "pin"; waveState = "idle"; statusEl.textContent = "» identität?";
        $("help").textContent = "Glückwunsch, der Code war richtig. Aber bist du wirklich Henne - oder nur ein Triebtäter? Verifiziere dich, indem du die letzten vier Ziffern der Sendungsnummer vom Paket eingibst.";
        code.value = ""; code.placeholder = "● ● ● ●";
        code.type = "password";                                  // maskiert → stream-sicher
        code.setAttribute("inputmode", "numeric"); code.setAttribute("maxlength", "4");
        code.setAttribute("autocomplete", "off");
        send.textContent = "Verifizieren"; send.disabled = false;

    async function doReveal(html) {
        await wait(reduce ? 0 : 600);

        view.innerHTML = html; view.classList.add("revealed");
        const eb = view.querySelector("[data-scramble]");

    $("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        showMsg("", false);

        if (phase === "code") {
            const norm = normalize(code.value);
            if (!norm) return;
            if (handleEgg(norm)) return;           // Eier zählen nicht als Fehlversuch
            send.disabled = true; send.textContent = "…";
            waveState = "decoding"; statusEl.textContent = "» entschlüssele…";
            try {
                await verifyMessage(norm);         // wirft, wenn Nachricht falsch
                await wait(reduce ? 0 : 700);
                savedNorm = norm;
                enterPinPhase();
            } catch (_) {
                await wait(reduce ? 0 : 350);
                wrongCount++;
                const lines = [
                    "Code nicht erkannt. Versuch es nochmal.",
                    "Immer noch nichts. Das Signal ist geduldig, du auch?",
                    "Dritter Fehlversuch. Jetzt konzentriere dich mal, das ist doch nicht so schwer.",
                    "Vierter. Im Paket liegt ein Notfall-Umschlag. Nur so als Tipp.",
                    "Soll ich Hilfe rufen, oder schaffst du das noch allein?"
                ];
                waveState = "error"; statusEl.textContent = "» kein empfang";
                showMsg(lines[Math.min(wrongCount - 1, lines.length - 1)], false);
                send.disabled = false; send.textContent = "Senden"; jiggle();
                setTimeout(() => { if (waveState === "error") { waveState = "idle"; statusEl.innerHTML = SLUG_IDLE; } }, 1400);
            }
            return;
        }

        // phase === "pin"
        const pin = (code.value.match(/\d/g) || []).join("");
        if (pin.length !== 4) { showMsg("Vier Ziffern - die letzten vier der Sendungsnummer auf dem Paket.", true); jiggle(); return; }
        send.disabled = true; send.textContent = "…";
        waveState = "decoding"; statusEl.textContent = "» verifiziere…";
        try {
            const html = await decryptReveal(savedNorm, pin);   // braucht Nachricht + PIN
            await doReveal(html);
        } catch (_) {
            await wait(reduce ? 0 : 350);
            pinTries++;
            const pl = [
                "Falscher Code. Verdächtig.",
                "Immer noch falsch. Ein echte Henne hätte das gewusst.",
                "Nope. Langsam glaube ich, du bist wirklich ein Triebtäter.",
                "Die letzten vier Ziffern der Sendungsnummer stehen auf dem Paket. Du schaffst das."
            ];
            waveState = "error"; statusEl.textContent = "» identität abgelehnt";
            showMsg(pl[Math.min(pinTries - 1, pl.length - 1)], false);
            send.disabled = false; send.textContent = "Verifizieren"; jiggle();
            setTimeout(() => { if (waveState === "error") { waveState = "idle"; statusEl.textContent = "» identität?"; } }, 1600);
        }
    });

    /* ── Versteckt: Konami-Code (oben oben unten unten links rechts links rechts B A) → Disco ── */
    const KONAMI = ["arrowup","arrowup","arrowdown","arrowdown","arrowleft","arrowright","arrowleft","arrowright","b","a"];
    let kseq = [];
    addEventListener("keydown", (e) => {
        kseq.push((e.key || "").toLowerCase());
        kseq = kseq.slice(-KONAMI.length);
        if (kseq.join() === KONAMI.join()) {
            kseq = [];
            statusEl.textContent = "» disco-modus";
            if (reduce) { showMsg("Disco-Modus angefordert, aber du hast Bewegung reduziert. Spielverderber.", true); return; }
            document.body.classList.add("disco");
            fireConfetti(["#ff4d4d", "#ffd166", "#06d6a0", "#4d9bff", "#c77dff"]);
            setTimeout(() => { document.body.classList.remove("disco"); resetSlugSoon(); }, 2800);
        }
    });

    /* ── Anfang: Titel entschlüsselt sich ── */
    scramble($("title"), "Signal zurücksenden", 1200);

    /* ── Gruß an die Konsolen-Hacker (MortysTerminal lässt grüßen) ── */
    console.log("%c» Konsole offen, Erwartungen niedrig.", "color:#e7d7c1;font-size:14px;font-weight:700");
    console.log("%cHier gibt es keinen Code zu finden, nur AES-256-GCM und meinen Sarkasmus. sudo geh zurueck in den Chat. - M.", "color:#8c1c13");
    </script>
